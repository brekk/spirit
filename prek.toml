[[repos]]
repo = "https://github.com/pre-commit/pre-commit-hooks"
rev = "v6.0.0"
hooks = [
  { id = "check-json" },
  { id = "end-of-file-fixer" },
]

[[repos]]
repo = "local"
hooks = [
  {id ="madlib-format", name="madlib format", entry="bash -c 'for x in \"$@\"; do madlib format -i \"$x\" --fix; done' --", language="system", files = "\\.mad$"}
]
